<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Smart Quiz | Internetdan savollar + Qiyinlik tanlovi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0b1120 0%, #111827 100%);
      min-height: 100vh;
      color: #f1f5f9;
      padding: 20px 12px 90px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    /* sozlamalar paneli (kategoriya + qiyinlik) */
    .settings-panel {
      background: rgba(17, 24, 39, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 36px;
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid rgba(56, 189, 248, 0.3);
    }

    .setting-group {
      margin-bottom: 18px;
    }

    .setting-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e6;
    }

    select, .difficulty-buttons {
      width: 100%;
      padding: 12px 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 48px;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .difficulty-buttons {
      display: flex;
      gap: 12px;
      padding: 0;
      background: transparent;
      border: none;
    }

    .diff-btn {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      padding: 10px 0;
      border-radius: 60px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .diff-btn.active {
      background: #0ea5e9;
      border-color: #0ea5e9;
      box-shadow: 0 0 8px #0ea5e9;
    }

    .fetch-btn {
      background: linear-gradient(95deg, #22c55e, #16a34a);
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 16px;
      color: white;
      cursor: pointer;
      margin-top: 8px;
    }

    /* statistikalar */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(15, 23, 42, 0.8);
      border-radius: 32px;
      padding: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #facc15, #38bdf8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* savol kartasi */
    .quiz-card {
      background: rgba(17, 24, 39, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 22px;
      border: 1px solid rgba(56, 189, 248, 0.3);
    }

    .question-text {
      font-size: 1.5rem;
      line-height: 1.4;
      font-weight: 600;
      margin: 16px 0 24px;
    }

    .options-grid {
      display: grid;
      gap: 12px;
      margin: 20px 0;
    }

    .option-btn {
      background: #1e293b;
      border: 1.5px solid #334155;
      border-radius: 40px;
      padding: 14px 18px;
      font-size: 1rem;
      text-align: left;
      color: #f1f5f9;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-btn:hover:not(:disabled) {
      background: #334155;
      border-color: #38bdf8;
    }

    .prefix {
      background: #0f172a;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      font-weight: 800;
    }

    .correct-highlight {
      background: rgba(34, 197, 94, 0.2);
      border-color: #22c55e;
      box-shadow: 0 0 6px #22c55e;
    }

    .wrong-highlight {
      background: rgba(239, 68, 68, 0.2);
      border-color: #ef4444;
      text-decoration: line-through;
    }

    .feedback {
      background: #111827aa;
      border-radius: 28px;
      padding: 12px 18px;
      margin: 15px 0;
      border-left: 5px solid #38bdf8;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 44px;
      padding: 12px;
      font-weight: 700;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    .btn-primary {
      background: linear-gradient(95deg, #0ea5e9, #3b82f6);
    }

    .loader {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: #38bdf8;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }

    footer {
      text-align: center;
      font-size: 11px;
      margin-top: 24px;
      color: #6b7280;
    }

    @media (min-width: 540px) {
      .options-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- sozlamalar: kategoriya va qiyinlik -->
  <div class="settings-panel">
    <div class="setting-group">
      <div class="setting-label">📚 FAN (KATEGORIYA)</div>
      <select id="categorySelect">
        <option value="any">🎲 Tasodifiy fan</option>
        <option value="9">🔬 Umumiy bilim</option>
        <option value="17">⚛ Fan va tabiat</option>
        <option value="23">📜 Tarix</option>
        <option value="18">💻 Informatika</option>
        <option value="22">🌍 Geografiya</option>
        <option value="25">🎨 Sanʼat</option>
        <option value="21">⚽ Sport</option>
      </select>
    </div>
    <div class="setting-group">
      <div class="setting-label">⚡ QIYINLIK DARAJASI</div>
      <div class="difficulty-buttons" id="difficultyGroup">
        <div class="diff-btn" data-diff="easy">🟢 Oson</div>
        <div class="diff-btn active" data-diff="medium">🟡 O‘rta</div>
        <div class="diff-btn" data-diff="hard">🔴 Qiyin</div>
      </div>
    </div>
    <button class="fetch-btn" id="fetchBtn">🌐 Yangi savollar olish</button>
  </div>

  <!-- statistikalar -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">⭐ BALL</div><div class="stat-value" id="scoreValue">0</div></div>
    <div class="stat-card"><div class="stat-label">✅ TO‘G‘RI</div><div class="stat-value" id="correctValue">0</div></div>
    <div class="stat-card"><div class="stat-label">📌 SAVOL</div><div class="stat-value" id="progressValue">0/0</div></div>
  </div>

  <!-- savollar maydoni -->
  <div class="quiz-card">
    <div class="question-text" id="questionText">⚡ Kategoriya va qiyinlikni tanlab, "Yangi savollar olish" tugmasini bosing</div>
    <div id="optionsArea" class="options-grid"></div>
    <div class="feedback" id="feedbackMsg">✨ Javob variantlaridan birini tanlang</div>
    <div class="action-buttons">
      <button class="btn btn-primary" id="nextBtn" disabled>➡ Keyingi savol</button>
    </div>
  </div>
  <footer>🌐 Har safar internetdan yangi savollar | Ingliz tilida, ammo interfeys o‘zbekcha</footer>
</div>

<script>
  // ------------------- KONFIGURATSIYA -------------------
  const API_BASE = 'https://opentdb.com/api.php';
  let currentDifficulty = 'medium';   // easy, medium, hard
  let currentCategory = 'any';        // 'any' yoki ID son
  let activeQuestions = [];            // massiv: { question, correct_answer, incorrect_answers, options[] }
  let currentIndex = 0;
  let score = 0;
  let correctCount = 0;
  let answered = false;
  let loading = false;

  // DOM elementlari
  const categorySelect = document.getElementById('categorySelect');
  const difficultyBtns = document.querySelectorAll('.diff-btn');
  const fetchBtn = document.getElementById('fetchBtn');
  const nextBtn = document.getElementById('nextBtn');
  const questionTextEl = document.getElementById('questionText');
  const optionsArea = document.getElementById('optionsArea');
  const feedbackMsg = document.getElementById('feedbackMsg');
  const scoreSpan = document.getElementById('scoreValue');
  const correctSpan = document.getElementById('correctValue');
  const progressSpan = document.getElementById('progressValue');

  // ------------------- Yordamchi funksiyalar -------------------
  function decodeHtml(html) {
    const txt = document.createElement('textarea');
    txt.innerHTML = html;
    return txt.value;
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // API dan savollarni olish
  async function fetchQuestions() {
    loading = true;
    answered = false;
    nextBtn.disabled = true;
    feedbackMsg.innerHTML = "⏳ Internetdan savollar yuklanmoqda... Iltimos kuting.";
    questionTextEl.textContent = "Yuklanmoqda...";
    optionsArea.innerHTML = `<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>🌍 API ga so‘rov yuborilmoqda</span></div>`;

    let url = `${API_BASE}?amount=8&type=multiple`;
    if (currentCategory !== 'any') url += `&category=${currentCategory}`;
    url += `&difficulty=${currentDifficulty}`;

    try {
      const response = await fetch(url);
      const data = await response.json();
      if (data.response_code !== 0 || !data.results || data.results.length === 0) {
        throw new Error("Savollar topilmadi. Iltimos, boshqa parametrlarni tanlang.");
      }
      // API javoblarini mos formatga o‘tkazish
      activeQuestions = data.results.map(q => ({
        question: decodeHtml(q.question),
        correct_answer: decodeHtml(q.correct_answer),
        incorrect_answers: q.incorrect_answers.map(decodeHtml),
        options: shuffleArray([decodeHtml(q.correct_answer), ...q.incorrect_answers.map(decodeHtml)])
      }));
      currentIndex = 0;
      score = 0;
      correctCount = 0;
      updateStatsUI();
      renderCurrentQuestion();
      feedbackMsg.innerHTML = "✅ Savollar muvaffaqiyatli olindi! Javob bering.";
    } catch (err) {
      console.error(err);
      feedbackMsg.innerHTML = `❌ Xatolik: ${err.message}. Internet ulanishini tekshiring yoki boshqa fan/qiyinlik tanlang.`;
      questionTextEl.textContent = "⚠️ Savollarni yuklab bo‘lmadi. Qaytadan urinib ko‘ring.";
      optionsArea.innerHTML = "";
      activeQuestions = [];
      updateStatsUI();
    } finally {
      loading = false;
    }
  }

  function updateStatsUI() {
    scoreSpan.textContent = score;
    correctSpan.textContent = correctCount;
    if (activeQuestions.length) {
      progressSpan.textContent = `${currentIndex+1}/${activeQuestions.length}`;
    } else {
      progressSpan.textContent = "0/0";
    }
  }

  function renderCurrentQuestion() {
    if (!activeQuestions.length || currentIndex >= activeQuestions.length) {
      finishGame();
      return;
    }
    answered = false;
    nextBtn.disabled = true;
    const q = activeQuestions[currentIndex];
    questionTextEl.textContent = q.question;
    // variantlarni chiqarish
    optionsArea.innerHTML = "";
    const letters = ["A", "B", "C", "D"];
    q.options.forEach((opt, idx) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = `<span class="prefix">${letters[idx]}</span> <span>${opt}</span>`;
      btn.addEventListener("click", () => {
        if (answered || loading) {
          feedbackMsg.innerHTML = "⛔ Siz allaqachon javob bergansiz. Keyingi savolga o‘ting.";
          return;
        }
        checkAnswer(opt, q.correct_answer, btn);
      });
      optionsArea.appendChild(btn);
    });
    feedbackMsg.innerHTML = "🤔 To‘g‘ri variantni tanlang.";
    updateStatsUI();
  }

  function checkAnswer(selected, correct, btnElement) {
    answered = true;
    const isCorrect = (selected === correct);
    const allOptions = document.querySelectorAll(".option-btn");

    // To‘g‘ri javobni yashil rang bilan belgilash
    allOptions.forEach(opt => {
      opt.disabled = true;
      if (opt.innerText.includes(correct)) {
        opt.classList.add("correct-highlight");
      }
    });

    if (isCorrect) {
      btnElement.classList.add("correct-highlight");
      score += 10;
      correctCount++;
      feedbackMsg.innerHTML = `✅ To‘g‘ri javob! +10 ball. (Javob: ${correct})`;
    } else {
      btnElement.classList.add("wrong-highlight");
      feedbackMsg.innerHTML = `❌ Xato! To‘g‘ri javob: ${correct}. Siz tanlagan: ${selected}`;
    }
    updateStatsUI();
    nextBtn.disabled = false;
  }

  function nextQuestion() {
    if (!answered && activeQuestions.length > 0 && currentIndex < activeQuestions.length) {
      feedbackMsg.innerHTML = "⚠️ Avval javob variantini tanlang!";
      return;
    }
    if (currentIndex + 1 < activeQuestions.length) {
      currentIndex++;
      renderCurrentQuestion();
    } else {
      finishGame();
    }
  }

  function finishGame() {
    if (activeQuestions.length) {
      questionTextEl.textContent = "🏆 O‘yin yakunlandi!";
      optionsArea.innerHTML = "";
      feedbackMsg.innerHTML = `🎉 Siz ${activeQuestions.length} ta savoldan ${correctCount} ta to‘g‘ri javob berdingiz. Umumiy ball: ${score}. Yangi sozlamalar bilan "Yangi savollar olish" tugmasini bosing.`;
    } else {
      questionTextEl.textContent = "📭 Hozircha savollar yo‘q. Yangi savollarni yuklang.";
    }
    nextBtn.disabled = true;
    progressSpan.textContent = activeQuestions.length ? `${activeQuestions.length}/${activeQuestions.length}` : "0/0";
    answered = true;
  }

  // ------------------- Qiyinlik tanlovi interfeysi -------------------
  difficultyBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      difficultyBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentDifficulty = btn.getAttribute('data-diff');
    });
  });

  // Kategoriya o‘zgarishi
  categorySelect.addEventListener('change', (e) => {
    currentCategory = e.target.value;
  });

  // Yangi savollar olish
  fetchBtn.addEventListener('click', () => {
    if (loading) return;
    fetchQuestions();
  });

  nextBtn.addEventListener('click', nextQuestion);

  // Sahifa yuklanganda darhol bir marta savollarni olish (default: o‘rta qiyinlik, tasodifiy fan)
  fetchQuestions();
</script>
</body>
</html>
